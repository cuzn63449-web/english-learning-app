{% extends "base.html" %}
{% block content %}
<h1 class="page-title">🎙️ 口语练习</h1>

<div id="chatArea" style="margin-bottom:100px"></div>

<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding:0 2px">
    <button class="btn btn-sm btn-outline" onclick="quickOral('给我一段考研英语口语练习稿，话题随意')" style="white-space:nowrap;flex-shrink:0;font-size:12px">📝 随机稿子</button>
    <button class="btn btn-sm btn-outline" onclick="quickOral('给我一段关于自我介绍的英语口语稿')" style="white-space:nowrap;flex-shrink:0;font-size:12px">👤 自我介绍</button>
    <button class="btn btn-sm btn-outline" onclick="quickOral('给我一段关于为什么考研的英语口语稿')" style="white-space:nowrap;flex-shrink:0;font-size:12px">🎓 关于考研</button>
    <button class="btn btn-sm btn-outline" onclick="quickOral('给我一段日常对话的英语口语稿')" style="white-space:nowrap;flex-shrink:0;font-size:12px">💬 日常对话</button>
</div>

<div style="position:fixed;bottom:calc(var(--nav-height) + var(--safe-bottom) + 6px);left:0;right:0;max-width:480px;margin:0 auto;background:var(--card);padding:8px 14px;z-index:101;display:flex;gap:8px;border-top:1px solid rgba(0,0,0,0.06);padding-bottom:max(8px,var(--safe-bottom))">
    <button class="btn btn-primary" id="recordBtn" onclick="toggleRecord()" style="width:56px;height:40px;border-radius:50%;padding:0;font-size:20px;flex-shrink:0;line-height:40px">🎤</button>
    <input id="chatInput" class="search-box" placeholder="打字输入或按🎤录音..." style="margin:0;flex:1;font-size:15px" onkeydown="if(event.key==='Enter')sendOralMsg()">
    <button class="btn btn-primary" onclick="sendOralMsg()" style="padding:10px 16px">发送</button>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/voice.js"></script>
{% endblock %}
