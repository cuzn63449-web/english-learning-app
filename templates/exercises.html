{% extends "base.html" %}
{% block content %}
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h1 class="page-title" style="margin:0">✨ AI英语助教</h1>
    <span class="tag tag-pink" id="learnedCount">--</span>
</div>

<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap" id="quickBtns">
    <button class="btn btn-sm btn-outline" onclick="quickSend('帮我出5道选择题')" style="font-size:12px;padding:8px 12px">📝 选择题</button>
    <button class="btn btn-sm btn-outline" onclick="quickSend('生成一篇阅读')" style="font-size:12px;padding:8px 12px">📖 阅读</button>
    <button class="btn btn-sm btn-outline" onclick="quickSend('出一道写作题')" style="font-size:12px;padding:8px 12px">✍️ 写作</button>
    <button class="btn btn-sm btn-outline" onclick="quickSend('分析一篇文章')" style="font-size:12px;padding:8px 12px">🔍 分析</button>
</div>

<div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
    <span style="font-size:13px;color:var(--text-light);white-space:nowrap">📋 单词组：</span>
    <select id="groupSelect" onchange="changeGroup()" class="search-box" style="padding:8px 12px;margin:0;flex:1;font-size:13px">
        <option value="">全部词汇（智能选择）</option>
    </select>
</div>

<div id="chatArea" style="margin-bottom:80px"></div>

<div style="position:fixed;bottom:calc(var(--nav-height) + var(--safe-bottom) + 6px);left:0;right:0;max-width:480px;margin:0 auto;background:var(--card);padding:8px 14px;z-index:101;display:flex;gap:8px;border-top:1px solid rgba(0,0,0,0.06);padding-bottom:max(8px, var(--safe-bottom))">
    <input id="chatInput" class="search-box" placeholder="输入你的答案或问题..." style="margin:0;flex:1;font-size:15px" onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="btn btn-primary" onclick="sendMsg()" style="padding:10px 16px">发送</button>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/exercises.js"></script>
{% endblock %}
