{% extends "base.html" %}
{% block content %}
<h1 class="page-title">📝 词汇库 <span style="font-size:14px;color:var(--text-light);font-weight:400" id="totalBadge"></span></h1>

<div id="levelBar" style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-sm btn-primary" onclick="switchLevel('考研')">考研</button>
    <button class="btn btn-sm btn-outline" onclick="switchLevel('专四')">专四</button>
    <button class="btn btn-sm btn-outline" onclick="switchLevel('专八')">专八</button>
</div>

<div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-box" id="searchInput" placeholder="搜索单词或释义..." oninput="search()">
</div>

<div id="wordList"></div>

<div style="display:flex;justify-content:center;gap:8px;margin-top:16px" id="pagination"></div>

<!-- 单词详情弹窗 -->
<div class="detail-overlay" id="detailOverlay" style="display:none" onclick="if(event.target===this)closeDetail()">
    <div class="detail-card" id="detailCard"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
var currentPage = 1, totalPages = 1, query = '', currentLevel = '考研';

function switchLevel(level) {
    currentLevel = level;
    var btns = document.querySelectorAll('#levelBar .btn');
    btns.forEach(function(b){
        b.className = (b.textContent === level) ? 'btn btn-sm btn-primary' : 'btn btn-sm btn-outline';
    });
    search(1);
}

function search(p) {
    if (p) currentPage = p;
    query = document.getElementById('searchInput').value;
    showLoading();
    fetch('/api/words?q='+encodeURIComponent(query)+'&page='+currentPage+'&level='+encodeURIComponent(currentLevel)).then(function(r){ return r.json(); }).then(function(d){
        hideLoading();
        renderList(d.words);
        totalPages = d.pages;
        document.getElementById('totalBadge').textContent = '('+d.total+'词)';
        renderPagination();
    });
}

function renderList(words) {
    if (words.length === 0) {
        document.getElementById('wordList').innerHTML = '<div class="empty-mascot"><div class="mascot">🐱</div><div class="msg">没找到这个词~</div></div>';
        return;
    }
    var html = '';
    words.forEach(function(w){
        html += '<div class="word-item" onclick="openDetail('+w.id+')">';
        // 高频词推荐（基于真实考研考频数据）
        var isImportant = w.frequency > 0;
        html += '<div><div class="word">'+w.word+(isImportant?' <span class="tag tag-gold" style="font-size:10px">推荐AI</span>':'');
        html += '</div><div class="meaning">'+w.meaning.substring(0,50)+'</div></div>';
        html += '<div style="font-size:12px;color:var(--text-light)">'+(w.part_of_speech||'')+'</div>';
        html += '</div>';
    });
    document.getElementById('wordList').innerHTML = html;
}

function renderPagination() {
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    var html = '';
    html += '<button class="btn btn-sm btn-outline" onclick="search(1)" '+(currentPage===1?'disabled':'')+'>首页</button>';
    html += '<button class="btn btn-sm btn-outline" onclick="search('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>‹</button>';
    html += '<span class="tag tag-blue">'+currentPage+'/'+totalPages+'</span>';
    html += '<button class="btn btn-sm btn-outline" onclick="search('+(currentPage+1)+')" '+(currentPage===totalPages?'disabled':'')+'>›</button>';
    html += '<button class="btn btn-sm btn-outline" onclick="search('+totalPages+')" '+(currentPage===totalPages?'disabled':'')+'>末页</button>';
    document.getElementById('pagination').innerHTML = html;
}

function openDetail(id, enrich) {
    showLoading();
    var url = '/api/words/'+id;
    if (enrich) url += '?enrich=1';
    fetch(url).then(function(r){ return r.json(); }).then(function(d){
        hideLoading();
        if (enrich) updateCostBubble();
        var w = d.word;
        var html = '<div style="position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;background:var(--card)">';
        html += '<h2 style="margin:0;color:var(--blue-dark)">'+w.word+'</h2>';
        html += '<button class="btn btn-sm btn-outline" onclick="closeDetail()">✕</button></div>';
        if (w.phonetic) html += '<p style="color:var(--text-light)">'+w.phonetic+'</p>';
        html += '<p><span class="tag tag-blue">'+w.part_of_speech+'</span> <span class="tag tag-pink">'+w.level+'</span>';
        if (w.frequency) html += ' <span class="tag tag-gold">考频: '+w.frequency+'</span>';
        html += '</p>';
        html += '<div class="section-title">释义</div><p>'+w.meaning+'</p>';

        // 例句（默认显示）
        var examples = (d.meanings||[]).filter(function(m){ return m.meaning_type==='例句'; });
        if (examples.length > 0) {
            html += '<div style="background:var(--pink-light);padding:12px;border-radius:var(--radius-sm);margin:12px 0">';
            examples.forEach(function(ex){ html += '<p style="font-size:14px;margin-bottom:4px">📖 '+ex.example+'</p><p style="font-size:13px;color:var(--text-light);margin-bottom:8px;padding-left:16px">'+ex.meaning+'</p>'; });
            html += '</div>';
        }

        // 标签页按钮
        // 如果数据不完整，显示AI补充按钮
        var hasData = (d.meanings && d.meanings.length > 0) || (d.exam_points && d.exam_points.length > 0) || w.root_affix;
        if (!hasData) {
            html += '<button class="btn btn-sm btn-outline" style="width:100%;margin:8px 0" onclick="closeDetail();openDetail('+w.id+',true)">🤖 AI补充（约¥0.002）</button>';
        }

        html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin:12px 0" id="tabBtns">';
        var tabs = [['root','词根词缀'],['deriv','派生词'],['colloc','词组搭配'],['exam','考点'],['extra','熟词生义'],['sibling','同根词']];
        tabs.forEach(function(t){
            html += '<button class="btn btn-sm btn-outline tab-btn" onclick="switchTab(\''+t[0]+'\')">'+t[1]+'</button>';
        });
        html += '</div>';

        // 内容区
        html += '<div id="tabContentArea" style="min-height:40px;padding:8px 0"></div>';

        // 所有数据存在JS变量里
        html += '<script id="wordData" type="application/json">'+JSON.stringify(d)+'</sc'+'ript>';

        if (d.progress) html += '<div class="section-title" style="margin-top:12px">学习进度</div><p>状态: <span class="tag tag-green">'+d.progress.status+'</span> | 下次复习: '+d.progress.next_review_date+'</p>';

        document.getElementById('detailCard').innerHTML = html;
        document.getElementById('detailOverlay').style.display = 'flex';

        // 解析数据并默认显示词根词缀
        setTimeout(function(){
            window._wordData = d;
            switchTab('root');
        }, 100);
    });
}

function closeDetail() { document.getElementById('detailOverlay').style.display = 'none'; }

function switchTab(tab) {
    var d = window._wordData;
    if (!d) return;
    var w = d.word, html = '';
    var btns = document.querySelectorAll('.tab-btn');
    btns.forEach(function(b){ b.className = 'btn btn-sm btn-outline tab-btn'; });

    if (tab === 'root') {
        btns[0].className = 'btn btn-sm btn-primary tab-btn';
        html = w.root_affix ? '<p>'+w.root_affix+'</p>' : '<p style="color:var(--text-light)">暂无词根词缀信息</p>';
    } else if (tab === 'deriv') {
        btns[1].className = 'btn btn-sm btn-primary tab-btn';
        html = w.derivatives ? '<p>'+w.derivatives+'</p>' : '<p style="color:var(--text-light)">暂无派生词信息</p>';
    } else if (tab === 'colloc') {
        btns[2].className = 'btn btn-sm btn-primary tab-btn';
        var collocs = (d.meanings||[]).filter(function(m){ return m.meaning_type==='词组搭配'; });
        if (collocs.length > 0) {
            collocs.forEach(function(c){ html += '<p style="font-size:14px;margin-bottom:4px"><strong>'+c.meaning+'</strong>'+'</p><p style="font-size:13px;color:var(--text-light);margin-bottom:8px">'+c.example+'</p>'; });
        } else { html = '<p style="color:var(--text-light)">暂无词组搭配信息</p>'; }
    } else if (tab === 'exam') {
        btns[3].className = 'btn btn-sm btn-primary tab-btn';
        if (d.exam_points.length > 0) {
            d.exam_points.forEach(function(p){ html += '<p style="font-size:14px;margin-bottom:6px"><strong>'+p.point_type+':</strong> '+p.description+(p.example?' <span style="color:var(--text-light)">例: '+p.example+'</span>':''); });
        } else { html = '<p style="color:var(--text-light)">暂无考点信息</p>'; }
    } else if (tab === 'extra') {
        btns[4].className = 'btn btn-sm btn-primary tab-btn';
        var extras = (d.meanings||[]).filter(function(m){ return m.meaning_type==='熟词生义'; });
        if (extras.length > 0) {
            extras.forEach(function(m){ html += '<p style="font-size:14px;margin-bottom:4px"><strong>'+m.meaning+'</strong>'+'</p><p style="font-size:13px;color:var(--text-light);margin-bottom:8px">'+m.example+'</p>'; });
        } else { html = '<p style="color:var(--text-light)">暂无熟词生义信息</p>'; }
    } else if (tab === 'sibling') {
        btns[5].className = 'btn btn-sm btn-primary tab-btn';
        if (d.siblings && d.siblings.length > 0) {
            d.siblings.forEach(function(s){
                html += '<span class="tag tag-blue" style="cursor:pointer;margin:2px" onclick="event.stopPropagation();closeDetail();openDetail('+s.id+')">'+s.word+'</span> ';
            });
        } else { html = '<p style="color:var(--text-light)">暂无同根词信息</p>'; }
    }
    document.getElementById('tabContentArea').innerHTML = html;
}

search(1);
</script>
{% endblock %}
